name: hotel-ota-sync-lab

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hotel_ota_sync
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d hotel_ota_sync"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mock-bluewave:
    build:
      context: ..
      dockerfile: src/MockOta.BlueWave/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Fault injection is off by default. Flip Enabled=true and tune the
      # probabilities at runtime to demo Polly retries / circuit breaking.
      FaultInjection__Enabled: "false"
      FaultInjection__LatencyProbability: "0.0"
      FaultInjection__LatencyMs: "0"
      FaultInjection__ServerErrorProbability: "0.0"
      FaultInjection__ServerErrorStatusCode: "503"
    ports:
      - "5101:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  api:
    build:
      context: ..
      dockerfile: src/HotelOtaSync.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Channels__BlueWave__BaseUrl: http://mock-bluewave:8080/
      Channels__BlueWave__PerAttemptTimeout: "00:00:02"
      Channels__BlueWave__TotalRequestTimeout: "00:00:10"
      Channels__BlueWave__MaxRetryAttempts: "2"
      Cache__Redis__ConnectionString: redis:6379
      Cache__Redis__SnapshotTtl: "00:05:00"
      Admin__Token: ${ADMIN_TOKEN:-INSECURE-DEV-ONLY-DO-NOT-USE-IN-PRODUCTION-12345678}
    ports:
      - "5100:8080"
    depends_on:
      redis:
        condition: service_healthy
      mock-bluewave:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  pg-data:
